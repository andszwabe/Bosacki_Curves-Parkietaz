<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkietaż — Piotr Bosacki</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');

:root {
  --bg-color: #f8fafc;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --border-color: #cbd5e1;
  --accent-black: #000000;
  --accent-gray: #f1f5f9;
  
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-sans: 'Inter', sans-serif;
  --error-color: #dc2626;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem;
}

.app-container {
  width: 100%;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  align-items: center;
}

.app-header {
  width: 100%;
  max-width: 600px;
  text-align: center;
  margin-bottom: 0.2rem;
}

h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2.2rem;
  color: var(--text-primary);
  margin-bottom: 0.2rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 1s;
}

.subtitle {
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 2s;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Visualization Board */
.canvas-board {
  aspect-ratio: 1 / 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 1rem;
  cursor: pointer;
}

@media (min-width: 768px) {
  .canvas-board {
    height: 500px;
    width: auto;
    max-width: 100vw;
  }
}

#curve-svg {
  display: block;
  max-width: 100%;
  max-height: 100%;
  color: #000000;
}

/* Controls section (direct on page background, no panel) */
.controls-section {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn-icon {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  padding: 0;
}

.btn-icon:hover:not(:disabled) {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.btn-icon.active {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-icon:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-icon svg {
  display: block;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
  align-self: flex-start;
  flex: none;
  height: auto;
}

.series-actions-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.2rem;
  align-items: center;
  /* Match the legend row's content inset (border 2px + padding 0.6rem) so the
     [↺] and [👁] action squares align vertically with the legend's [1.0] and [👁] columns. */
  padding: 0 calc(0.6rem + 2px);
}

#library-btn {
  width: 110px;
  justify-content: center;
  flex: none;
}

#color-mode-btn {
  width: 90px;
  justify-content: center;
  flex: none;
}

.btn.btn-actions-square {
  width: 34px;
  height: 34px;
  padding: 0;
  justify-content: center;
  align-items: center;
  display: flex;
  flex: none;
  font-size: 0.8rem;
}

.btn.btn-actions-square.active {
  background: var(--accent-black);
  color: #ffffff;
  border-color: var(--accent-black);
}

/* Equalize all buttons inside the action row to 34px tall so they line up with
   the legend row's 34px [1.0] thickness pill and [👁] eye button below. */
.series-actions-row .btn {
  height: 34px;
}

.textarea-container {
  position: relative;
  width: 100%;
}

textarea, .textarea-backdrop {
  margin: 0;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  font-family: monospace;
  font-size: 0.9rem;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
  box-sizing: border-box;
}

textarea {
  width: 100%;
  background: transparent !important;
  color: transparent !important;
  caret-color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s ease;
  resize: vertical;
  min-height: 120px;
  position: relative;
  z-index: 2;
  display: block;
  scrollbar-width: none; /* Firefox */
}

textarea::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

textarea:focus {
  border-color: var(--accent-black);
}

.textarea-backdrop {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  color: #94a3b8;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
  border-color: transparent;
  scrollbar-width: none; /* Firefox */
}

.textarea-backdrop::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

.hl-parsed {
  font-weight: bold;
}

.series-legend-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 100%;
  margin-top: 0.4rem;
}

.series-legend-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  padding: 0.4rem 0.6rem;
  background: #ffffff;
  border: 2px solid var(--border-color);
  border-radius: 6px;
}

.series-legend-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
}

.series-legend-num {
  font-weight: 600;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s ease;
}

.series-legend-num:hover {
  color: var(--accent-black);
  text-decoration: underline;
}

.series-legend-parsed {
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Buttons Row */
.actions-row {
  display: flex;
  gap: 0.8rem;
  align-items: center;
  width: 100%;
}

.btn {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.85rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: background-color 0.15s ease, border-color 0.15s ease;
  flex: 1; /* Stretches to fill remaining space */
}

.btn-primary {
  background: var(--accent-black);
  color: #ffffff;
}

.btn-primary:hover {
  background: #27272a;
}

.btn-secondary {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
}

.btn-secondary:hover:not(:disabled) {
  background: #f8fafc;
  border-color: #94a3b8;
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Mono mode button: inverted (black fill, white text) */
.btn-mono {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-mono:hover {
  background: #27272a !important;
}

/* Error alert styling */
.error-box {
  background: #fef2f2;
  border: 1px solid #fee2e2;
  color: var(--error-color);
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.4;
  margin-top: 0.2rem;
}

.hidden {
  display: none !important;
}

/* Stats board */
.stats {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: monospace;
  background: #f1f5f9;
  padding: 0.6rem 0.8rem; /* matched button padding height */
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  flex-shrink: 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  height: 33px; /* aligns height perfectly with button */
}

/* Legend helper card */
.legend-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 0.8rem;
}

.legend-card p {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-bottom: 0.3rem;
}

.legend-card p:last-child {
  margin-bottom: 0;
}

.legend-card strong {
  color: var(--text-primary);
}

.legend-card code {
  background: #f1f5f9;
  padding: 0.05rem 0.2rem;
  border-radius: 3px;
  font-family: monospace;
  color: var(--text-primary);
  font-size: 0.75rem;
}

/* Drag and Drop Overlay */
.drag-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(241, 245, 249, 0.95); /* matching --accent-gray */
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none; /* Crucial: lets drag events fall through without flickering */
  transition: opacity 0.2s ease;
  border: 2px dashed var(--border-color);
  border-radius: 8px;
}

.drag-overlay-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  text-align: center;
}

.drag-overlay-text {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  color: var(--text-secondary);
  line-height: 1.2;
}

.drag-overlay-icon {
  color: var(--text-secondary);
  width: 44px;
  height: 44px;
}

/* Disable pointer events on SVG to prevent drag-and-drop flickering */
#curve-svg, #curve-svg * {
  pointer-events: none;
}

/* Modal Overlay & Container */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(15, 23, 42, 0.4); /* soft slate overlay */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.25s ease;
}

.modal-overlay.hidden {
  display: none !important;
}

.modal-container {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  overflow: hidden;
  margin: 1rem;
  animation: modalSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modalSlideIn {
  from {
    transform: translateY(20px) scale(0.98);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

.modal-header {
  padding: 1.2rem;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-primary);
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 1.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  line-height: 1;
  padding: 0.2rem;
  transition: color 0.15s ease;
}

.modal-close-btn:hover {
  color: var(--text-primary);
}

.modal-body {
  padding: 1.2rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.modal-body h3 {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.6rem;
}

/* Save section styling */
.save-layout-section {
  display: flex;
  flex-direction: column;
}

/* Narrow "Zapisz" button — auto-width, not stretched */
.save-btn-narrow {
  flex: none;
  width: auto;
  white-space: nowrap;
}

.save-input-row {
  display: flex;
  gap: 0.6rem;
}

.save-input-row input {
  flex: 1;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s ease;
}

.save-input-row input:focus {
  border-color: var(--accent-black);
}

/* Saved list section styling */
.layouts-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-height: 250px;
  overflow-y: auto;
}

.layouts-list-empty {
  padding: 1.5rem;
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-style: italic;
}

.layout-item-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem;
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  transition: border-color 0.15s ease;
}

.layout-item-row:hover {
  border-color: #94a3b8;
}

.layout-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--accent-black);
  cursor: pointer;
}

.layout-item-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.layout-item-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.layout-item-preview {
  font-family: monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-footer {
  padding: 1.2rem;
  border-top: 1px solid #f1f5f9;
  display: flex;
  justify-content: flex-end;
  background: var(--bg-color);
}

/* Settings Card */
.settings-card {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-view-mode-toggle {
  width: 100%;
  justify-content: center;
  text-align: center;
  font-size: 0.9rem;
  padding: 0.75rem 1.2rem;
  font-weight: 600;
}

/* ── Układ name field ── */
.layout-name-container {
  margin-top: 0.85rem;
  width: 100%;
  cursor: text;
  user-select: none;
  display: flex;
  align-items: center;
  min-height: 2.4rem;
  /* Base size; adjustLayoutNameFontSize() may scale this down to fit. */
  font-size: 1.55rem;
  overflow: hidden;
}

.layout-name-display {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  line-height: 1.2;
  display: flex;
  align-items: baseline;
  gap: 0;
  width: 100%;
}

.layout-name-prefix {
  flex: none;
}

.layout-name-edit-wrapper {
  display: none;
  align-items: baseline;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  line-height: 1.2;
  width: 100%;
}

.layout-name-container.editing .layout-name-display {
  display: none;
}

.layout-name-container.editing .layout-name-edit-wrapper {
  display: flex;
}

/* Off-screen mirror used to measure rendered text width at the unscaled
   1.55rem baseline; never visible, never affects layout. */
.layout-name-mirror {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  pointer-events: none;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.55rem;
  line-height: 1.2;
  left: -9999px;
  top: -9999px;
}

.layout-name-input {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  background: transparent;
  border: none;
  outline: none;
  padding: 0;
  margin: 0;
  min-width: 2ch;
  flex: 1;
  caret-color: var(--text-primary);
  line-height: 1.2;
}

/* ── Per-series thickness controls ── */
.thickness-container {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  margin-left: 0.4rem;
}

.thickness-btn-group {
  display: flex;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  height: 26px;
}

.thickness-btn {
  background: #ffffff;
  border: none;
  border-right: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.9rem;
  width: 24px;
  height: 100%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s ease;
  padding: 0;
  font-weight: 600;
}

.thickness-btn:last-child {
  border-right: none;
}

.thickness-btn:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
}

.thickness-value {
  font-size: 0.72rem;
  color: var(--text-secondary);
  font-weight: 600;
  min-width: 2.2ch;
  text-align: center;
  font-family: var(--font-sans);
  line-height: 1;
}

/* Collapsed thickness display — square pill matching the eye button next to it */
.thickness-display {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0;
  transition: all 0.15s ease;
  flex-shrink: 0;
}

.thickness-display:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.thickness-display.active {
  border-color: var(--accent-black);
  color: var(--text-primary);
  background: #ffffff;
}

/* Expanded thickness control — same size as the collapsed pill, styled as an editable field */
.thickness-input {
  background: #ffffff;
  border: 1px solid var(--accent-black);
  color: var(--text-primary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  text-align: center;
  padding: 0;
  flex-shrink: 0;
  outline: none;
  -moz-appearance: textfield;
}
.thickness-input::-webkit-outer-spin-button,
.thickness-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Pill containing − and + */
.thickness-pill {
  display: flex;
  align-items: center;
  border: 1px solid var(--border-color);
  border-radius: 999px;
  overflow: hidden;
  height: 24px;
  background: #ffffff;
  flex-shrink: 0;
}

.thickness-pill-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-weight: 600;
  width: 22px;
  height: 100%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background-color 0.12s ease, color 0.12s ease;
}

.thickness-pill-btn:first-child {
  border-right: 1px solid var(--border-color);
}

.thickness-pill-btn:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
}

/* Round single-series reset button (between pill and input) */
.thickness-reset-btn {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.12s ease;
  flex-shrink: 0;
}

.thickness-reset-btn:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.absolute-settings-panel {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  width: 100%;
}

.settings-row {
  display: flex;
  gap: 0.8rem;
  width: 100%;
}

.settings-footer {
  display: flex;
  justify-content: flex-end;
  width: 100%;
}

.setting-field {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  flex: 1;
}

.setting-field label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.setting-field input, .setting-field select {
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  font-family: var(--font-sans);
  outline: none;
  width: 100%;
  background-color: #ffffff;
}

.setting-field input:focus, .setting-field select:focus {
  border-color: var(--accent-black);
}

.error-box.warning-box {
  background: #fffbeb;
  border-color: #fde68a;
  color: #b45309;
}

/* Desk and Paper View for Tryb Absolutny */
.canvas-board.absolute-mode {
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.canvas-board.absolute-mode #curve-svg {
  background: #ffffff;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.08);
  border: 1px solid rgba(0,0,0,0.05);
  max-width: 100%;
  max-height: 100%;
  height: 100%;
  width: auto;
  transition: all 0.3s ease;
}

/* Transformation Button Group in Legend */
.transformation-group {
  display: flex;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  margin-left: auto;
}

.btn-transform {
  background: #ffffff;
  border: none;
  border-right: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.7rem;
  padding: 0.25rem 0.5rem;
  cursor: pointer;
  font-weight: 600;
  min-width: 26px;
  text-align: center;
  transition: all 0.15s ease;
}

.btn-transform:last-child {
  border-right: none;
}

.btn-transform:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
}

.btn-transform.active {
  background: var(--accent-black);
  color: #ffffff;
}

/* Legend Row Selection styling */
.series-legend-row {
  cursor: pointer;
  transition: all 0.2s ease;
}

.series-legend-row:hover {
  border-color: #94a3b8;
}

/* Transformed Notation italics style */
.series-legend-parsed.transformed {
  font-style: italic;
  font-weight: 500;
}

/* Cursor blink animation removed — we now use the native text input caret
   (driven by `caret-color: var(--text-primary)` on .layout-name-input). */

/* Export row layout */
.export-row {
  display: flex;
  gap: 0.8rem;
  align-items: flex-end;
  width: 100%;
}

.checkbox-container {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  height: 33px; /* Aligns height with input fields */
}

.checkbox-container input {
  width: 16px;
  height: 16px;
  accent-color: var(--accent-black);
  cursor: pointer;
}

.download-split-toggle {
  flex: none;
  white-space: nowrap;
}

/* Centering layout for board expansion */
.board-container {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* Margin overflow flashing animation */
@keyframes margin-flash {
  0%, 100% {
    stroke: #dc2626;
    opacity: 0.8;
  }
  50% {
    opacity: 0.25;
  }
}

.margin-warning-flashing {
  animation: margin-flash 1.2s infinite ease-in-out;

/**
 * Parses the notation string (e.g. "1p2p3p4p5l6l7l6l5p...") into structured modules.
 */
function parseNotation(notation) {
    const modules = [];
    const regex = /(\d+)([lLpP])/g;
    let match;
    while ((match = regex.exec(notation)) !== null) {
        const size = parseInt(match[1], 10);
        const direction = match[2].toUpperCase();
        modules.push({ size, direction });
    }
    return modules;
}
/**
 * Generates a sequence of quarter-circle arc segments from modules using turtle graphics math.
 * Invariant: 1p1p1p1p produces a perfect circle closing back to start.
 */
function generateArcs(modules, scale = 1) {
    // Start turtle at (0, 0) facing UP (Math.PI / 2) to align with reference SVG chirality
    let state = { x: 0, y: 0, angle: Math.PI / 2 };
    const arcs = [];
    for (const mod of modules) {
        if (mod.size < 1) {
            throw new Error(`Rozmiar modułu (${mod.size}) musi wynosić co najmniej 1.`);

            info.addEventListener("click", () => {
                checkbox.checked = !checkbox.checked;
                updateImportButtonState();
            });
            const nameSpan = document.createElement("span");
            nameSpan.className = "layout-item-name";
            nameSpan.textContent = layout.name;
            const previewSpan = document.createElement("span");
            previewSpan.className = "layout-item-preview";
            previewSpan.textContent = layout.notation;
            info.appendChild(nameSpan);
            info.appendChild(previewSpan);
            // Delete Button
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn-icon";
            deleteBtn.title = "Usuń z biblioteki";
            deleteBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      `;
            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation(); // Avoid triggering info click/checkbox toggle
                if (confirm(`Czy na pewno chcesz usunąć układ "${layout.name}"?`)) {
                    const currentLayouts = loadSavedLayouts();
                    const filtered = currentLayouts.filter(l => l.id !== layout.id);
                    saveSavedLayouts(filtered);
                    refreshLibraryList();
                }
            });
            row.appendChild(checkbox);
            row.appendChild(info);
            row.appendChild(deleteBtn);
            savedLayoutsListEl.appendChild(row);
        });
        updateImportButtonState();
    }
    function updateImportButtonState() {
        const checkboxes = savedLayoutsListEl.querySelectorAll(".layout-checkbox");
        const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
        importLayoutsBtn.disabled = !anyChecked;
    }
    if (libraryBtn) {
        libraryBtn.addEventListener("click", openLibraryModal);
    }
    if (modalCloseBtn) {
        modalCloseBtn.addEventListener("click", closeLibraryModal);
    }
    if (libraryModal) {
        libraryModal.addEventListener("click", (e) => {
            if (e.target === libraryModal) {
                closeLibraryModal();
            }
        });
    }
    // Generic Esc-to-close for any open modal overlay (works for future modals too).
    document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape")
            return;
        const openModals = document.querySelectorAll(".modal-overlay:not(.hidden)");
        if (openModals.length === 0)
            return;
        // Close only the topmost (last in DOM order) so stacked modals work.
        openModals[openModals.length - 1].classList.add("hidden");
    });
    // Space toggles the animation (same as clicking the canvas), unless the user is
    // typing in a textarea/input or a modal is open.
    document.addEventListener("keydown", (e) => {
        if (e.key !== " " && e.code !== "Space")
            return;
        const tag = (e.target && e.target.tagName) || "";
        if (tag === "TEXTAREA" || tag === "INPUT" || tag === "SELECT")
            return;
        if (document.querySelector(".modal-overlay:not(.hidden)"))
            return;
        e.preventDefault();
        if (animationFrameId !== null) {
            renderCurves();
        }
        else {
            startAnimation();
        }
    });
    if (saveLayoutBtn) {
        const submitSaveLayout = () => {
            saveErrorEl.textContent = "";
            saveErrorEl.classList.add("hidden");
            const name = saveLayoutNameInput.value.trim();
            if (!name) {
                saveErrorEl.textContent = "Podaj nazwę układu.";
                saveErrorEl.classList.remove("hidden");
                return;
            }
            const notation = textareaEl.value.trim();
            if (!notation) {
                saveErrorEl.textContent = "Pole notacji jest puste. Wpisz coś przed zapisaniem.";
                saveErrorEl.classList.remove("hidden");
                return;
            }
            const layouts = loadSavedLayouts();
            const exists = layouts.some(l => l.name.toLowerCase() === name.toLowerCase());
            if (exists) {
                if (!confirm(`Układ o nazwie "${name}" już istnieje w bibliotece. Czy chcesz go zastąpić?`)) {
                    return;
                }
            }
            const filteredLayouts = layouts.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            filteredLayouts.push({
                id: `layout_${Date.now()}`,
                name,
                notation,
                timestamp: Date.now()
            });
            saveSavedLayouts(filteredLayouts);
            saveLayoutNameInput.value = "";
            refreshLibraryList();
        };
        saveLayoutBtn.addEventListener("click", submitSaveLayout);
        if (saveLayoutNameInput) {
            saveLayoutNameInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    submitSaveLayout();
                }
            });
        }
    }
    if (importLayoutsBtn) {
        importLayoutsBtn.addEventListener("click", () => {
            const checkedRows = savedLayoutsListEl.querySelectorAll(".layout-item-row");
            const selectedLayouts = [];
            const layouts = loadSavedLayouts();
            checkedRows.forEach(row => {
                const checkbox = row.querySelector(".layout-checkbox");
                if (checkbox && checkbox.checked) {
                    const id = row.dataset.id;
                    const layout = layouts.find(l => l.id === id);
                    if (layout) {
                        selectedLayouts.push(layout);
                    }
                }
            });
            if (selectedLayouts.length > 0) {
                // Reverse them so they are appended in chronological order (oldest first)
                selectedLayouts.reverse();
                const joinedNotations = selectedLayouts
                    .map(l => l.notation.trim())
                    .filter(n => n.length > 0)
                    .join("\n");
                if (joinedNotations.length > 0) {
                    textareaEl.value = joinedNotations;
                    renderCurves();
                    closeLibraryModal();
                    startAnimation();
                }
            }
        });
    }
    // Presets (Tryb Absolutny — sheet settings) — save / load via localStorage.
    const presetsBtn = document.getElementById("presets-btn");
    const presetsModal = document.getElementById("presets-modal");
    const presetsModalCloseBtn = document.getElementById("presets-modal-close-btn");
    const savePresetBtn = document.getElementById("save-preset-btn");
    const savePresetNameInput = document.getElementById("save-preset-name");
    const savePresetErrorEl = document.getElementById("save-preset-error");
    const savedPresetsListEl = document.getElementById("saved-presets-list");
    const PRESETS_STORAGE_KEY = "bosacki_saved_presets";
    function loadSavedPresets() {
        try {
            const data = localStorage.getItem(PRESETS_STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        catch (e) {
            console.error("Failed to load saved presets:", e);
            return [];
        }
    }
    function saveSavedPresets(presets) {
        try {
            localStorage.setItem(PRESETS_STORAGE_KEY, JSON.stringify(presets));
        }
        catch (e) {
            console.error("Failed to save presets to storage:", e);
        }
    }
    function snapshotCurrentPresetValues() {
        return {
            preset: absPresetSelect ? absPresetSelect.value : "custom",
            unit: absUnitSelect ? absUnitSelect.value : "px",
            width: absWidthInput ? absWidthInput.value : "",
            height: absHeightInput ? absHeightInput.value : "",
            margin: absMarginInput ? absMarginInput.value : "",
            scale: absScaleInput ? absScaleInput.value : "",
            shiftX: absShiftXInput ? absShiftXInput.value : "0",
            shiftY: absShiftYInput ? absShiftYInput.value : "0",
            autocenter: absAutocenterCheckbox ? absAutocenterCheckbox.checked : false
        };
    }
    function applyPresetValues(values) {
        if (!values)
            return;
        if (absPresetSelect && values.preset !== undefined)
            absPresetSelect.value = values.preset;
        if (absUnitSelect && values.unit !== undefined)
            absUnitSelect.value = values.unit;
        if (absWidthInput && values.width !== undefined)
            absWidthInput.value = String(values.width);
        if (absHeightInput && values.height !== undefined)
            absHeightInput.value = String(values.height);
        if (absMarginInput && values.margin !== undefined)
            absMarginInput.value = String(values.margin);
        if (absScaleInput && values.scale !== undefined)
            absScaleInput.value = String(values.scale);
        if (absShiftXInput && values.shiftX !== undefined)
            absShiftXInput.value = String(values.shiftX);
        if (absShiftYInput && values.shiftY !== undefined)
            absShiftYInput.value = String(values.shiftY);
        if (absAutocenterCheckbox && values.autocenter !== undefined)
            absAutocenterCheckbox.checked = !!values.autocenter;
        // Sync the unit baseline so handleManualChange() doesn't try to convert
        // the values we just wrote (they're already in the saved unit).
        if (absUnitSelect)
            lastKnownUnit = absUnitSelect.value;
        // Re-run the same path used by manual edits so the canvas updates.
        if (typeof handleManualChange === "function") {
            handleManualChange();
        }
    }
    function previewPresetValues(values) {
        const parts = [];
        if (values.unit)
            parts.push(`${values.width}×${values.height} ${values.unit}`);
        if (values.scale !== undefined && values.scale !== "")
            parts.push(`skala ${values.scale}`);
        if (values.margin !== undefined && values.margin !== "")
            parts.push(`margines ${values.margin}`);
        return parts.join(" · ");
    }
    function openPresetsModal() {
        if (!presetsModal)
            return;
        presetsModal.classList.remove("hidden");
        if (savePresetNameInput)
            savePresetNameInput.value = "";
        if (savePresetErrorEl) {
            savePresetErrorEl.textContent = "";
            savePresetErrorEl.classList.add("hidden");
        }
        refreshPresetsList();
    }
    function closePresetsModal() {
        if (presetsModal)
            presetsModal.classList.add("hidden");
    }
    function refreshPresetsList() {
        if (!savedPresetsListEl)
            return;
        savedPresetsListEl.innerHTML = "";
        const presets = loadSavedPresets();
        if (presets.length === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "layouts-list-empty";
            emptyDiv.textContent = "Brak zapisanych presetów.";
            savedPresetsListEl.appendChild(emptyDiv);
            return;
        }
        // Newest first.
        presets.sort((a, b) => b.timestamp - a.timestamp);
        presets.forEach(preset => {
            const row = document.createElement("div");
            row.className = "layout-item-row";
            row.dataset.id = preset.id;
            // Info — clicking it loads the preset and closes the modal.
            const info = document.createElement("div");
            info.className = "layout-item-info";
            info.style.cursor = "pointer";
            info.title = "Załaduj ten preset";
            info.addEventListener("click", () => {
                applyPresetValues(preset.values);
                closePresetsModal();
            });
            const nameSpan = document.createElement("span");
            nameSpan.className = "layout-item-name";
            nameSpan.textContent = preset.name;
            const previewSpan = document.createElement("span");
            previewSpan.className = "layout-item-preview";
            previewSpan.textContent = previewPresetValues(preset.values);
            info.appendChild(nameSpan);
            info.appendChild(previewSpan);
            // Delete button.
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn-icon";
            deleteBtn.title = "Usuń preset";
            deleteBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>`;
            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (confirm(`Czy na pewno chcesz usunąć preset "${preset.name}"?`)) {
                    const current = loadSavedPresets();
                    saveSavedPresets(current.filter(p => p.id !== preset.id));
                    refreshPresetsList();
                }
            });
            row.appendChild(info);
            row.appendChild(deleteBtn);
            savedPresetsListEl.appendChild(row);
        });
    }
    if (presetsBtn) {
        presetsBtn.addEventListener("click", openPresetsModal);
    }
    if (presetsModalCloseBtn) {
        presetsModalCloseBtn.addEventListener("click", closePresetsModal);
    }
    if (presetsModal) {
        presetsModal.addEventListener("click", (e) => {
            if (e.target === presetsModal)
                closePresetsModal();
        });
    }
    if (savePresetBtn) {
        const submitSavePreset = () => {
            if (!savePresetErrorEl)
                return;
            savePresetErrorEl.textContent = "";
            savePresetErrorEl.classList.add("hidden");
            const name = savePresetNameInput ? savePresetNameInput.value.trim() : "";
            if (!name) {
                savePresetErrorEl.textContent = "Podaj nazwę presetu.";
                savePresetErrorEl.classList.remove("hidden");
                return;
            }
            const values = snapshotCurrentPresetValues();
            const presets = loadSavedPresets();
            const exists = presets.some(p => p.name.toLowerCase() === name.toLowerCase());
            if (exists) {
                if (!confirm(`Preset o nazwie "${name}" już istnieje. Czy chcesz go zastąpić?`)) {
                    return;
                }
            }
            const filtered = presets.filter(p => p.name.toLowerCase() !== name.toLowerCase());
            filtered.push({
                id: `preset_${Date.now()}`,
                name,
                values,
                timestamp: Date.now()
            });
            saveSavedPresets(filtered);
            if (savePresetNameInput)
                savePresetNameInput.value = "";
            refreshPresetsList();
        };
        savePresetBtn.addEventListener("click", submitSavePreset);
        if (savePresetNameInput) {
            savePresetNameInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    submitSavePreset();
                }
            });
        }
    }
    // Initial load
    renderCurves();
    startAnimation();
}
// Execute initialization safely depending on page load state
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
}
else {
    init();
}

</script>
</body>
</html>
