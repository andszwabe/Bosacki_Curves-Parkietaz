<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkietaż — Piotr Bosacki</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');

:root {
  --bg-color: #f8fafc;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --border-color: #cbd5e1;
  --accent-black: #000000;
  --accent-gray: #f1f5f9;
  
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-sans: 'Inter', sans-serif;
  --error-color: #dc2626;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem;
}

.app-container {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.app-header {
  text-align: center;
  margin-bottom: 0.2rem;
}

h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2.2rem;
  color: var(--text-primary);
  margin-bottom: 0.2rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 1s;
}

.subtitle {
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 2s;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Visualization Board */
.canvas-board {
  aspect-ratio: 1 / 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 1rem;
  cursor: pointer;
}

#curve-svg {
  display: block;
  max-width: 100%;
  max-height: 100%;
  color: #000000;
}

/* Controls section (direct on page background, no panel) */
.controls-section {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.input-wrapper {
  position: relative;
  display: flex;
  width: 100%;
}

.series-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  width: 100%;
}

.series-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
}

.color-badge {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
}

.btn-icon {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  padding: 0;
}

.btn-icon:hover:not(:disabled) {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.btn-icon.active {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-icon:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-icon svg {
  display: block;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
  align-self: flex-start;
  flex: none;
  height: auto;
}

.series-actions-row {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.2rem;
}

#library-btn {
  width: 110px;
  justify-content: center;
  flex: none;
}

#color-mode-btn {
  width: 90px;
  justify-content: center;
  flex: none;
}

.textarea-container {
  position: relative;
  width: 100%;
}

textarea, .textarea-backdrop {
  margin: 0;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  font-family: monospace;
  font-size: 0.9rem;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
  box-sizing: border-box;
}

textarea {
  width: 100%;
  background: transparent !important;
  color: transparent !important;
  caret-color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s ease;
  resize: vertical;
  min-height: 120px;
  position: relative;
  z-index: 2;
  display: block;
  scrollbar-width: none; /* Firefox */
}

textarea::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

textarea:focus {
  border-color: var(--accent-black);
}

.textarea-backdrop {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  color: #94a3b8;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
  border-color: transparent;
  scrollbar-width: none; /* Firefox */
}

.textarea-backdrop::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

.hl-parsed {
  font-weight: bold;
}

.series-legend-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 100%;
  margin-top: 0.4rem;
}

.series-legend-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  padding: 0.4rem 0.6rem;
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 6px;
}

.series-legend-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
}

.series-legend-num {
  font-weight: 600;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s ease;
}

.series-legend-num:hover {
  color: var(--accent-black);
  text-decoration: underline;
}

.series-legend-parsed {
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Buttons Row */
.actions-row {
  display: flex;
  gap: 0.8rem;
  align-items: center;
  width: 100%;
}

.btn {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.85rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: background-color 0.15s ease, border-color 0.15s ease;
  flex: 1; /* Stretches to fill remaining space */
}

.btn-primary {
  background: var(--accent-black);
  color: #ffffff;
}

.btn-primary:hover {
  background: #27272a;
}

.btn-secondary {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
}

.btn-secondary:hover:not(:disabled) {
  background: #f8fafc;
  border-color: #94a3b8;
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Mono mode button: inverted (black fill, white text) */
.btn-mono {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-mono:hover {
  background: #27272a !important;
}

/* Error alert styling */
.error-box {
  background: #fef2f2;
  border: 1px solid #fee2e2;
  color: var(--error-color);
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.4;
  margin-top: 0.2rem;
}

.hidden {
  display: none !important;
}

/* Stats board */
.stats {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: monospace;
  background: #f1f5f9;
  padding: 0.6rem 0.8rem; /* matched button padding height */
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  flex-shrink: 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  height: 33px; /* aligns height perfectly with button */
}

/* Legend helper card */
.legend-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 0.8rem;
}

.legend-card p {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-bottom: 0.3rem;
}

.legend-card p:last-child {
  margin-bottom: 0;
}

.legend-card strong {
  color: var(--text-primary);
}

.legend-card code {
  background: #f1f5f9;
  padding: 0.05rem 0.2rem;
  border-radius: 3px;
  font-family: monospace;
  color: var(--text-primary);
  font-size: 0.75rem;
}

/* Drag and Drop Overlay */
.drag-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(241, 245, 249, 0.95); /* matching --accent-gray */
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none; /* Crucial: lets drag events fall through without flickering */
  transition: opacity 0.2s ease;
  border: 2px dashed var(--border-color);
  border-radius: 8px;
}

.drag-overlay-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  text-align: center;
}

.drag-overlay-text {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  color: var(--text-secondary);
  line-height: 1.2;
}

.drag-overlay-icon {
  color: var(--text-secondary);
  width: 44px;
  height: 44px;
}

/* Disable pointer events on SVG to prevent drag-and-drop flickering */
#curve-svg, #curve-svg * {
  pointer-events: none;
}

/* Modal Overlay & Container */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(15, 23, 42, 0.4); /* soft slate overlay */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.25s ease;
}

.modal-overlay.hidden {
  display: none !important;
}

.modal-container {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  overflow: hidden;
  margin: 1rem;
  animation: modalSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modalSlideIn {
  from {
    transform: translateY(20px) scale(0.98);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

.modal-header {
  padding: 1.2rem;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-primary);
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 1.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  line-height: 1;
  padding: 0.2rem;
  transition: color 0.15s ease;
}

.modal-close-btn:hover {
  color: var(--text-primary);
}

.modal-body {
  padding: 1.2rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.modal-body h3 {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.6rem;
}

/* Save section styling */
.save-layout-section {
  display: flex;
  flex-direction: column;
}

/* Narrow "Zapisz" button — auto-width, not stretched */
.save-btn-narrow {
  flex: none;
  width: auto;
  white-space: nowrap;
}

.save-input-row {
  display: flex;
  gap: 0.6rem;
}

.save-input-row input {
  flex: 1;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s ease;
}

.save-input-row input:focus {
  border-color: var(--accent-black);
}

/* Saved list section styling */
.layouts-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-height: 250px;
  overflow-y: auto;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--accent-gray);
  padding: 0.4rem;
}

.layouts-list-empty {
  padding: 1.5rem;
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-style: italic;
}

.layout-item-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem;
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  transition: border-color 0.15s ease;
}

.layout-item-row:hover {
  border-color: #94a3b8;
}

.layout-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--accent-black);
  cursor: pointer;
}

.layout-item-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.layout-item-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.layout-item-preview {
  font-family: monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-footer {
  padding: 1.2rem;
  border-top: 1px solid #f1f5f9;
  display: flex;
  justify-content: flex-end;
  background: var(--bg-color);
}

  <script>
    // Global error diagnostic handler
    window.onerror = function(message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.backgroundColor = '#dc2626';
      errDiv.style.color = '#ffffff';
      errDiv.style.padding = '15px';
      errDiv.style.zIndex = '99999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '14px';
      errDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.3)';
      errDiv.innerHTML = '<strong>Błąd aplikacji:</strong> ' + message + ' <br><small>Plik: ' + source + ' | Linia: ' + lineno + '</small>';
      document.body.appendChild(errDiv);
      return false;
    };
  </script>

  <script>
"use strict";
// Geometric Engine for Piotr Bosacki's Curves (Parkietaż)
const PHI = (1 + Math.sqrt(5)) / 2; // Golden Ratio
/**
 * Parses the notation string (e.g. "1p2p3p4p5l6l7l6l5p...") into structured modules.
 */
function parseNotation(notation) {
    const modules = [];
    const regex = /(\d+)([lLpP])/g;
    let match;
    while ((match = regex.exec(notation)) !== null) {
        const size = parseInt(match[1], 10);
        const direction = match[2].toUpperCase();
        modules.push({ size, direction });
    }
    return modules;
}
/**
 * Generates a sequence of quarter-circle arc segments from modules using turtle graphics math.
 * Invariant: 1p1p1p1p produces a perfect circle closing back to start.
 */
function generateArcs(modules) {
    // Start turtle at (0, 0) facing UP (Math.PI / 2) to align with reference SVG chirality
    let state = { x: 0, y: 0, angle: Math.PI / 2 };
    const arcs = [];
    for (const mod of modules) {
        if (mod.size < 1) {
            throw new Error(`Rozmiar modułu (${mod.size}) musi wynosić co najmniej 1.`);
        }
        if (mod.size > 32) {
            throw new Error(`Rozmiar modułu (${mod.size}) przekracza limit 32 (wielkość rośnie wykładniczo).`);
        }
        const radius = Math.pow(PHI, mod.size);
        const turnRight = mod.direction === 'P';
        const s = turnRight ? 1 : -1;
        // The center of curvature is perpendicular to the current heading
        const cx = state.x + radius * Math.cos(state.angle - s * Math.PI / 2);
        const cy = state.y + radius * Math.sin(state.angle - s * Math.PI / 2);
        // Endpoint of the 90° arc
        const endX = cx + radius * Math.cos(state.angle);
        const endY = cy + radius * Math.sin(state.angle);
        // Update heading angle by 90°
        const newAngle = state.angle - s * Math.PI / 2;

    });
    // Prevent browser default drop behavior globally so it doesn't open the file,
    // but preserve default drag-and-drop on the textarea.
    window.addEventListener("dragover", (e) => {
        e.preventDefault();
    }, false);
    window.addEventListener("drop", (e) => {
        if (e.target !== textareaEl) {
            e.preventDefault();
        }
    }, false);
    // Drag and drop .txt files onto the curve preview area
    const dragOverlay = document.getElementById("drag-overlay");
    let dragCounter = 0;
    containerEl.addEventListener("dragenter", (e) => {
        e.preventDefault();
        dragCounter++;
        if (dragOverlay) {
            dragOverlay.classList.remove("hidden");
        }
    });
    containerEl.addEventListener("dragover", (e) => {
        e.preventDefault();
    });
    containerEl.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0 && dragOverlay) {
            dragCounter = 0;
            dragOverlay.classList.add("hidden");
        }
    });
    containerEl.addEventListener("drop", (e) => {
        e.preventDefault();
        dragCounter = 0;
        if (dragOverlay) {
            dragOverlay.classList.add("hidden");
        }
        if (e.dataTransfer && e.dataTransfer.files.length > 0) {
            const files = Array.from(e.dataTransfer.files);
            // Try to read all dropped files as text (more resilient on Linux filesystems)
            if (files.length > 0) {
                const filePromises = files.map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            var _a;
                            resolve(((_a = event.target) === null || _a === void 0 ? void 0 : _a.result) || '');
                        };
                        reader.readAsText(file);
                    });
                });
                Promise.all(filePromises).then((contents) => {
                    const joinedText = contents
                        .map(c => c.trim())
                        .filter(c => c.length > 0)
                        .join("\n");
                    if (joinedText.length > 0) {
                        textareaEl.value = joinedText;
                        renderCurves();
                        startAnimation();
                    }
                });
            }
        }
    });
    // Saved Curves Library Logic
    const libraryBtn = document.getElementById("library-btn");
    const libraryModal = document.getElementById("library-modal");
    const modalCloseBtn = document.getElementById("modal-close-btn");
    const saveLayoutBtn = document.getElementById("save-layout-btn");
    const saveLayoutNameInput = document.getElementById("save-layout-name");
    const saveErrorEl = document.getElementById("save-error");
    const savedLayoutsListEl = document.getElementById("saved-layouts-list");
    const importLayoutsBtn = document.getElementById("import-layouts-btn");
    const STORAGE_KEY = "bosacki_saved_layouts";
    function loadSavedLayouts() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        catch (e) {
            console.error("Failed to load saved layouts:", e);
            return [];
        }
    }
    function saveSavedLayouts(layouts) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(layouts));
        }
        catch (e) {
            console.error("Failed to save layouts to storage:", e);
        }
    }
    function openLibraryModal() {
        if (libraryModal) {
            libraryModal.classList.remove("hidden");
            saveLayoutNameInput.value = "";
            saveErrorEl.textContent = "";
            saveErrorEl.classList.add("hidden");
            refreshLibraryList();
        }
    }
    function closeLibraryModal() {
        if (libraryModal) {
            libraryModal.classList.add("hidden");
        }
    }
    function refreshLibraryList() {
        if (!savedLayoutsListEl)
            return;
        savedLayoutsListEl.innerHTML = "";
        const layouts = loadSavedLayouts();
        if (layouts.length === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "layouts-list-empty";
            emptyDiv.textContent = "Brak zapisanych układów w bibliotece.";
            savedLayoutsListEl.appendChild(emptyDiv);
            importLayoutsBtn.disabled = true;
            return;
        }
        // Sort by timestamp descending (newest first)
        layouts.sort((a, b) => b.timestamp - a.timestamp);
        layouts.forEach(layout => {
            const row = document.createElement("div");
            row.className = "layout-item-row";
            row.dataset.id = layout.id;
            // Checkbox
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "layout-checkbox";
            checkbox.addEventListener("change", updateImportButtonState);
            // Info block (clickable to toggle checkbox)
            const info = document.createElement("div");
            info.className = "layout-item-info";
            info.addEventListener("click", () => {
                checkbox.checked = !checkbox.checked;
                updateImportButtonState();
            });
            const nameSpan = document.createElement("span");
            nameSpan.className = "layout-item-name";
            nameSpan.textContent = layout.name;
            const previewSpan = document.createElement("span");
            previewSpan.className = "layout-item-preview";
            previewSpan.textContent = layout.notation;
            info.appendChild(nameSpan);
            info.appendChild(previewSpan);
            // Delete Button
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn-icon";
            deleteBtn.title = "Usuń z biblioteki";
            deleteBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      `;
            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation(); // Avoid triggering info click/checkbox toggle
                if (confirm(`Czy na pewno chcesz usunąć układ "${layout.name}"?`)) {
                    const currentLayouts = loadSavedLayouts();
                    const filtered = currentLayouts.filter(l => l.id !== layout.id);
                    saveSavedLayouts(filtered);
                    refreshLibraryList();
                }
            });
            row.appendChild(checkbox);
            row.appendChild(info);
            row.appendChild(deleteBtn);
            savedLayoutsListEl.appendChild(row);
        });
        updateImportButtonState();
    }
    function updateImportButtonState() {
        const checkboxes = savedLayoutsListEl.querySelectorAll(".layout-checkbox");
        const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
        importLayoutsBtn.disabled = !anyChecked;
    }
    if (libraryBtn) {
        libraryBtn.addEventListener("click", openLibraryModal);
    }
    if (modalCloseBtn) {
        modalCloseBtn.addEventListener("click", closeLibraryModal);
    }
    if (libraryModal) {
        libraryModal.addEventListener("click", (e) => {
            if (e.target === libraryModal) {
                closeLibraryModal();
            }
        });
    }
    if (saveLayoutBtn) {
        saveLayoutBtn.addEventListener("click", () => {
            saveErrorEl.textContent = "";
            saveErrorEl.classList.add("hidden");
            const name = saveLayoutNameInput.value.trim();
            if (!name) {
                saveErrorEl.textContent = "Podaj nazwę układu.";
                saveErrorEl.classList.remove("hidden");
                return;
            }
            const notation = textareaEl.value.trim();
            if (!notation) {
                saveErrorEl.textContent = "Pole notacji jest puste. Wpisz coś przed zapisaniem.";
                saveErrorEl.classList.remove("hidden");
                return;
            }
            const layouts = loadSavedLayouts();
            const exists = layouts.some(l => l.name.toLowerCase() === name.toLowerCase());
            if (exists) {
                if (!confirm(`Układ o nazwie "${name}" już istnieje w bibliotece. Czy chcesz go zastąpić?`)) {
                    return;
                }
            }
            const filteredLayouts = layouts.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            filteredLayouts.push({
                id: `layout_${Date.now()}`,
                name,
                notation,
                timestamp: Date.now()
            });
            saveSavedLayouts(filteredLayouts);
            saveLayoutNameInput.value = "";
            refreshLibraryList();
        });
    }
    if (importLayoutsBtn) {
        importLayoutsBtn.addEventListener("click", () => {
            const checkedRows = savedLayoutsListEl.querySelectorAll(".layout-item-row");
            const selectedLayouts = [];
            const layouts = loadSavedLayouts();
            checkedRows.forEach(row => {
                const checkbox = row.querySelector(".layout-checkbox");
                if (checkbox && checkbox.checked) {
                    const id = row.dataset.id;
                    const layout = layouts.find(l => l.id === id);
                    if (layout) {
                        selectedLayouts.push(layout);
                    }
                }
            });
            if (selectedLayouts.length > 0) {
                // Reverse them so they are appended in chronological order (oldest first)
                selectedLayouts.reverse();
                const joinedNotations = selectedLayouts
                    .map(l => l.notation.trim())
                    .filter(n => n.length > 0)
                    .join("\n");
                if (joinedNotations.length > 0) {
                    textareaEl.value = joinedNotations;
                    renderCurves();
                    closeLibraryModal();
                    startAnimation();
                }
            }
        });
    }
    // Initial load
    renderCurves();
    startAnimation();
}
// Execute initialization safely depending on page load state
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
}
else {
    init();
}

</script>
</body>
