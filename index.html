<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkietaż — Piotr Bosacki</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');

:root {
  --bg-color: #f8fafc;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --border-color: #cbd5e1;
  --accent-black: #000000;
  --accent-gray: #f1f5f9;
  
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-sans: 'Inter', sans-serif;
  --error-color: #dc2626;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem;
}

.app-container {
  width: 100%;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  align-items: center;
}

.app-header {
  width: 100%;
  max-width: 600px;
  text-align: center;
  margin-bottom: 0.2rem;
}

h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2.2rem;
  color: var(--text-primary);
  margin-bottom: 0.2rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 1s;
}

.subtitle {
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
  animation-delay: 2s;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Visualization Board */
.canvas-board {
  aspect-ratio: 1 / 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 1rem;
  cursor: pointer;
}

@media (min-width: 768px) {
  .canvas-board {
    height: 500px;
    width: auto;
    max-width: 100vw;
  }
}

#curve-svg {
  display: block;
  max-width: 100%;
  max-height: 100%;
  color: #000000;
}

/* Controls section (direct on page background, no panel) */
.controls-section {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn-icon {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  padding: 0;
}

.btn-icon:hover:not(:disabled) {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.btn-icon.active {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-icon:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-icon svg {
  display: block;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
  align-self: flex-start;
  flex: none;
  height: auto;
}

.series-actions-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.2rem;
  align-items: center;
  /* Match the legend row's content inset (border 2px + padding 0.6rem) so the
     [↺] and [👁] action squares align vertically with the legend's [1.0] and [👁] columns. */
  padding: 0 calc(0.6rem + 2px);
}

#library-btn {
  width: 110px;
  justify-content: center;
  flex: none;
}

#color-mode-btn {
  width: 90px;
  justify-content: center;
  flex: none;
}

#anim-mode-btn {
  width: 90px;
  justify-content: center;
  flex: none;
}

.btn.btn-actions-square {
  width: 34px;
  height: 34px;
  padding: 0;
  justify-content: center;
  align-items: center;
  display: flex;
  flex: none;
  font-size: 0.8rem;
}

.btn.btn-actions-square.active {
  background: var(--accent-black);
  color: #ffffff;
  border-color: var(--accent-black);
}

/* Equalize all buttons inside the action row to 34px tall so they line up with
   the legend row's 34px [1.0] thickness pill and [👁] eye button below. */
.series-actions-row .btn {
  height: 34px;
}

.textarea-container {
  position: relative;
  width: 100%;
}

textarea, .textarea-backdrop {
  margin: 0;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  font-family: monospace;
  font-size: 0.9rem;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
  box-sizing: border-box;
}

textarea {
  width: 100%;
  background: transparent !important;
  color: transparent !important;
  caret-color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s ease;
  resize: vertical;
  min-height: 120px;
  position: relative;
  z-index: 2;
  display: block;
  scrollbar-width: none; /* Firefox */
}

textarea::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

textarea:focus {
  border-color: var(--accent-black);
}

.textarea-backdrop {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  color: #94a3b8;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
  border-color: transparent;
  scrollbar-width: none; /* Firefox */
}

.textarea-backdrop::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

.hl-parsed {
  font-weight: bold;
}

.series-legend-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 100%;
  margin-top: 0.4rem;
}

.series-legend-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  padding: 0.4rem 0.6rem;
  background: #ffffff;
  border: 2px solid var(--border-color);
  border-radius: 6px;
}

.series-legend-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
}

.series-legend-num {
  font-weight: 600;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s ease;
}

.series-legend-num:hover {
  color: var(--accent-black);
  text-decoration: underline;
}

.series-legend-parsed {
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Buttons Row */
.actions-row {
  display: flex;
  gap: 0.8rem;
  align-items: center;
  width: 100%;
}

.btn {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.85rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: background-color 0.15s ease, border-color 0.15s ease;
  flex: 1; /* Stretches to fill remaining space */
}

.btn-primary {
  background: var(--accent-black);
  color: #ffffff;
}

.btn-primary:hover {
  background: #27272a;
}

.btn-secondary {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
}

.btn-secondary:hover:not(:disabled) {
  background: #f8fafc;
  border-color: #94a3b8;
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Mono mode button: inverted (black fill, white text) */
.btn-mono {
  background: var(--accent-black) !important;
  color: #ffffff !important;
  border-color: var(--accent-black) !important;
}

.btn-mono:hover {
  background: #27272a !important;
}

/* Error alert styling */
.error-box {
  background: #fef2f2;
  border: 1px solid #fee2e2;
  color: var(--error-color);
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.4;
  margin-top: 0.2rem;
}

.hidden {
  display: none !important;
}

/* Stats board */
.stats {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: monospace;
  background: #f1f5f9;
  padding: 0.6rem 0.8rem; /* matched button padding height */
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  flex-shrink: 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  height: 33px; /* aligns height perfectly with button */
}

/* Legend helper card */
.legend-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 0.8rem;
}

.legend-card p {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-bottom: 0.3rem;
}

.legend-card p:last-child {
  margin-bottom: 0;
}

.legend-card strong {
  color: var(--text-primary);
}

.legend-card code {
  background: #f1f5f9;
  padding: 0.05rem 0.2rem;
  border-radius: 3px;
  font-family: monospace;
  color: var(--text-primary);
  font-size: 0.75rem;
}

/* Drag and Drop Overlay */
.drag-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(241, 245, 249, 0.95); /* matching --accent-gray */
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none; /* Crucial: lets drag events fall through without flickering */
  transition: opacity 0.2s ease;
  border: 2px dashed var(--border-color);
  border-radius: 8px;
}

.drag-overlay-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  text-align: center;
}

.drag-overlay-text {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  color: var(--text-secondary);
  line-height: 1.2;
}

.drag-overlay-icon {
  color: var(--text-secondary);
  width: 44px;
  height: 44px;
}

/* Disable pointer events on SVG to prevent drag-and-drop flickering */
#curve-svg, #curve-svg * {
  pointer-events: none;
}

/* Modal Overlay & Container */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(15, 23, 42, 0.4); /* soft slate overlay */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.25s ease;
}

.modal-overlay.hidden {
  display: none !important;
}

.modal-container {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  overflow: hidden;
  margin: 1rem;
  animation: modalSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modalSlideIn {
  from {
    transform: translateY(20px) scale(0.98);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

.modal-header {
  padding: 1.2rem;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header-actions {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.modal-header h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-primary);
}

/* Biblioteka name field — same click-to-edit + font-fit pattern as the
   Układ heading, but smaller (matches modal header h2 size) and constrained
   to the row width so it doesn't run into the action buttons. Uses the
   shared .layout-name-display / .layout-name-edit-wrapper / .layout-name-input
   classes for typography and toggling; only sizing/fit overrides live here. */
.library-name-container {
  cursor: text;
  user-select: none;
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
  margin-right: 0.6rem;
  font-size: 1.4rem;
  overflow: hidden;
}

.library-name-mirror {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  pointer-events: none;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.4rem;
  line-height: 1.2;
  left: -9999px;
  top: -9999px;
}

.library-name-container .layout-name-display,
.library-name-container .layout-name-edit-wrapper {
  font-weight: 600;  /* h2-equivalent weight; .layout-name-* defaults to 700 */
}

/* Display ↔ edit toggle for the Biblioteka name (mirrors the .layout-name-container
   rules but scoped to the library variant). */
.library-name-container.editing .layout-name-display {
  display: none;
}

.library-name-container.editing .layout-name-edit-wrapper {
  display: flex;
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 1.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  line-height: 1;
  padding: 0.2rem;
  transition: color 0.15s ease;
}

.modal-close-btn:hover {
  color: var(--text-primary);
}

.modal-body {
  padding: 1.2rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.modal-body h3 {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.6rem;
}

/* Save section styling */
.save-layout-section {
  display: flex;
  flex-direction: column;
}

/* Narrow "Zapisz" button — auto-width, not stretched */
.save-btn-narrow {
  flex: none;
  width: auto;
  white-space: nowrap;
}

.save-input-row {
  display: flex;
  gap: 0.6rem;
}

.save-input-row input {
  flex: 1;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s ease;
}

.save-input-row input:focus {
  border-color: var(--accent-black);
}

/* Saved list section styling */
.layouts-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-height: 250px;
  overflow-y: auto;
}

.layouts-list-empty {
  padding: 1.5rem;
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-style: italic;
}

.layout-item-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem;
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  transition: border-color 0.15s ease, background 0.15s ease;
  cursor: pointer;
}

.layout-item-row:hover {
  border-color: #94a3b8;
  background: var(--accent-gray);
}

.library-search-row {
  display: flex;
  margin-bottom: 0.8rem;
}

.library-search-input {
  width: 100%;
  padding: 0.5rem 0.7rem;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  background: #ffffff;
  color: var(--text-primary);
  outline: none;
}

.library-search-input:focus {
  border-color: var(--accent-black);
}

.layout-item-meta {
  font-size: 0.7rem;
  color: var(--text-secondary);
  white-space: nowrap;
}

.save-confirmation-flash {
  background: #16a34a !important;
  color: #ffffff !important;
  border-color: #16a34a !important;
}

.layout-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--accent-black);
  cursor: pointer;
}

.layout-item-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.layout-item-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.layout-item-preview {
  font-family: monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-footer {
  padding: 1.2rem;
  border-top: 1px solid #f1f5f9;
  display: flex;
  justify-content: flex-end;
  gap: 0.6rem;
  background: var(--bg-color);
}

/* Settings Card */
.settings-card {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-view-mode-toggle {
  width: 100%;
  justify-content: center;
  text-align: center;
  font-size: 0.9rem;
  padding: 0.75rem 1.2rem;
  font-weight: 600;
}

/* ── Układ name field ── */
.layout-name-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 0.85rem;
  width: 100%;
}

.layout-name-container {
  flex: 1;
  min-width: 0;  /* allow the flex child to shrink below its intrinsic content width */
  cursor: text;
  user-select: none;
  display: flex;
  align-items: center;
  min-height: 2.4rem;
  /* Base size; adjustLayoutNameFontSize() may scale this down to fit. */
  font-size: 1.55rem;
  overflow: hidden;
}

.layout-name-display {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  line-height: 1.2;
  display: flex;
  align-items: baseline;
  gap: 0;
  width: 100%;
}

.layout-name-prefix {
  flex: none;
}

.layout-name-edit-wrapper {
  display: none;
  align-items: baseline;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  line-height: 1.2;
  width: 100%;
}

.layout-name-container.editing .layout-name-display {
  display: none;
}

.layout-name-container.editing .layout-name-edit-wrapper {
  display: flex;
}

/* Off-screen mirror used to measure rendered text width at the unscaled
   1.55rem baseline; never visible, never affects layout. */
.layout-name-mirror {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  pointer-events: none;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.55rem;
  line-height: 1.2;
  left: -9999px;
  top: -9999px;
}

.layout-name-input {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: inherit;
  color: var(--text-primary);
  background: transparent;
  border: none;
  outline: none;
  padding: 0;
  margin: 0;
  min-width: 2ch;
  flex: 1;
  caret-color: var(--text-primary);
  line-height: 1.2;
}

/* ── Per-series thickness controls ── */
.thickness-container {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  margin-left: 0.4rem;
}

.thickness-btn-group {
  display: flex;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  height: 26px;
}

.thickness-btn {
  background: #ffffff;
  border: none;
  border-right: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.9rem;
  width: 24px;
  height: 100%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s ease;
  padding: 0;
  font-weight: 600;
}

.thickness-btn:last-child {
  border-right: none;
}

.thickness-btn:hover {
  background: var(--accent-gray);
  color: var(--text-primary);
}

.thickness-value {
  font-size: 0.72rem;
  color: var(--text-secondary);
  font-weight: 600;
  min-width: 2.2ch;
  text-align: center;
  font-family: var(--font-sans);
  line-height: 1;
}

/* Collapsed thickness display — square pill matching the eye button next to it */
.thickness-display {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0;
  transition: all 0.15s ease;
  flex-shrink: 0;
}

.thickness-display:hover {

        <button id="save-to-library-btn" class="btn btn-secondary" title="Zapisz bieżący układ w Bibliotece pod nazwą z pola Układ (lub z datą+godziną gdy puste). Kolizje nazw rozwiązywane przez sufiks -1, -2, …">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          <span id="save-to-library-btn-text">Zapisz w Bibliotece</span>
        </button>
        <button id="library-btn" class="btn btn-secondary" title="Otwórz Bibliotekę zapisanych układów&#10;klawisz: [ B ]">
          <span class="swirl-icon">𖦹</span>
          <span>Biblioteka</span>
        </button>
      </div>

      <div class="legend-card">
        <p><strong>Zasady formatu:</strong> Notacja składa się z bloków <code>[rozmiar][skrętność]</code>:</p>
        <p>• Rozmiar: liczba od <strong>1 do 32</strong> (promień = &phi;<sup>rozmiar</sup>)</p>
        <p>• Skrętność: litera <strong>P</strong> (prawo) lub <strong>L</strong> (lewo).</p>
      </div>
    </div>
  </div>

  <!-- Library Modal Overlay -->
  <div id="library-modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <div id="library-name-container" class="library-name-container" title="Kliknij, aby nazwać Bibliotekę">
          <div id="library-name-display" class="layout-name-display">
            <span id="library-name-text">Biblioteka</span>
          </div>
          <div id="library-name-edit-wrapper" class="layout-name-edit-wrapper">
            <span class="layout-name-prefix">Biblioteka:&nbsp;</span>
            <input type="text" id="library-name-input" class="layout-name-input" maxlength="50" autocomplete="off" spellcheck="false" placeholder="" title="Wpisz nazwę Biblioteki (litery, cyfry, spacje). Trafia do nazwy pliku JSON eksportu jako U_Biblioteka_<nazwa>_<timestamp>.json.&#10;klawisz: [ Enter ] zapisuje, [ Esc ] anuluje" />
          </div>
        </div>
        <span id="library-name-mirror" class="library-name-mirror" aria-hidden="true"></span>
        <div class="modal-header-actions">
          <button id="library-export-btn" class="btn btn-secondary btn-small btn-actions-square" title="Eksportuj całą Bibliotekę do pliku JSON (kopia zapasowa)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          <button id="library-import-btn" class="btn btn-secondary btn-small btn-actions-square" title="Importuj Bibliotekę z pliku JSON (dołącza do istniejących układów; kolizje nazw rozwiązywane przez sufiks -1, -2, …)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </button>
          <button id="modal-close-btn" class="modal-close-btn" title="Zamknij okno&#10;klawisz: [ Esc ]">&times;</button>
        </div>
        <input type="file" id="library-import-file" accept="application/json,.json" style="display:none;">
      </div>
      <div class="modal-body">
        <!-- Search Bar -->
        <div class="library-search-row">
          <input type="text" id="library-search" class="library-search-input" autocomplete="off" spellcheck="false" placeholder="Szukaj po nazwie lub notacji…" title="Filtruje listę zapisanych układów w czasie pisania (po nazwie i notacji)">
        </div>

        <!-- Saved Layouts List -->
        <div class="saved-layouts-section">
          <div id="saved-layouts-list" class="layouts-list">
            <!-- Will be populated dynamically by JS -->
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="download-selected-layouts-btn" class="btn btn-secondary" disabled title="Pobierz zaznaczone układy jako osobne pliki (format z panelu eksportu)">Pobierz zaznaczone</button>
        <button id="load-selected-layouts-btn" class="btn btn-primary" disabled title="Załaduj zaznaczone układy do pola notacji i zamknij Bibliotekę">Załaduj zaznaczone</button>
        <button id="delete-selected-layouts-btn" class="btn btn-secondary" disabled title="Usuń wszystkie zaznaczone układy z Biblioteki">Usuń zaznaczone</button>
      </div>
    </div>
  </div>

  <!-- Presets Modal Overlay -->
  <div id="presets-modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <h2>Presety</h2>
        <button id="presets-modal-close-btn" class="modal-close-btn" title="Zamknij okno&#10;klawisz: [ Esc ]">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Save Preset Section -->
        <div class="save-layout-section">
          <div class="save-input-row">
            <input type="text" id="save-preset-name" placeholder="Nazwa presetu" title="Nazwa pod jaką preset zapisze się w localStorage.&#10;klawisz: [ Enter ] zapisuje">
            <button id="save-preset-btn" class="btn btn-primary btn-small save-btn-narrow" title="Zapisz bieżące ustawienia arkusza jako preset&#10;klawisz: [ Enter ]">Zapisz</button>
          </div>
          <div id="save-preset-error" class="error-box hidden" style="margin-top: 0.4rem;"></div>
        </div>

        <!-- Saved Presets List -->
        <div class="saved-layouts-section">
          <h3>Zapisane presety</h3>
          <div id="saved-presets-list" class="layouts-list">
            <!-- Will be populated dynamically by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

        let text;
        if (libraryNameContainer.classList.contains("editing")) {
            text = `Biblioteka:\u00a0${libraryNameInput ? libraryNameInput.value : ""}`;
        } else {
            text = libraryName ? `Biblioteka: ${libraryName}` : "Biblioteka";
        }
        libraryNameMirror.textContent = text;
        const textWidth = libraryNameMirror.offsetWidth;
        const containerWidth = libraryNameContainer.clientWidth;
        if (textWidth > containerWidth && containerWidth > 0) {
            const scale = containerWidth / textWidth;
            const newSize = Math.max(LIBRARY_NAME_MIN_REM, LIBRARY_NAME_BASE_REM * scale);
            libraryNameContainer.style.fontSize = `${newSize}rem`;
        } else {
            libraryNameContainer.style.fontSize = `${LIBRARY_NAME_BASE_REM}rem`;
        }
    }
    function updateLibraryNameDisplay() {
        if (!libraryNameText) return;
        libraryNameText.textContent = libraryName ? `Biblioteka: ${libraryName}` : "Biblioteka";
        adjustLibraryNameFontSize();
    }
    function enterLibraryNamingMode() {
        if (!libraryNameContainer) return;
        libraryNameContainer.classList.add("editing");
        if (libraryNameInput) {
            libraryNameInput.value = libraryName || "";
            libraryNameInput.focus();
            libraryNameInput.select();
        }
        adjustLibraryNameFontSize();
    }
    function exitLibraryNamingMode() {
        if (!libraryNameContainer) return;
        libraryNameContainer.classList.remove("editing");
        const raw = (libraryNameInput ? libraryNameInput.value : "").trim();
        // Same sanitization as Układ: letters/digits/spaces incl. Polish chars.
        const sanitized = raw.replace(/[^\w\u00C0-\u024F\s]/g, "").replace(/\s+/g, " ").trim();
        libraryName = sanitized;
        saveLibraryName(libraryName);
        updateLibraryNameDisplay();
    }
    if (libraryNameContainer) {
        libraryNameContainer.addEventListener("click", (e) => {
            if (!libraryNameContainer.classList.contains("editing")) {
                enterLibraryNamingMode();
                e.stopPropagation();
            }
        });
    }
    if (libraryNameInput) {
        libraryNameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                exitLibraryNamingMode();
            } else if (e.key === "Escape") {
                libraryNameInput.value = libraryName || "";
                exitLibraryNamingMode();
            }
        });
        libraryNameInput.addEventListener("input", adjustLibraryNameFontSize);
        libraryNameInput.addEventListener("blur", () => {
            setTimeout(() => {
                if (libraryNameContainer && libraryNameContainer.classList.contains("editing")) {
                    if (document.activeElement !== libraryNameInput) {
                        exitLibraryNamingMode();
                    }
                }
            }, 100);
        });
    }
    // Click outside the naming widget while editing exits the mode.
    document.addEventListener("click", (e) => {
        if (libraryNameContainer && libraryNameContainer.classList.contains("editing")) {
            if (!libraryNameContainer.contains(e.target)) {
                exitLibraryNamingMode();
            }
        }
    });
    // Initialise on load.
    libraryName = loadLibraryName();
    updateLibraryNameDisplay();
    // Re-fit on viewport resize and when the modal opens (clientWidth is 0
    // until the modal becomes visible; openLibraryModal triggers refresh).
    window.addEventListener("resize", adjustLibraryNameFontSize);

    if (libraryExportBtn) {
        libraryExportBtn.addEventListener("click", () => {
            const layouts = loadSavedLayouts();
            const payload = {
                schema: "bosacki_saved_layouts",
                version: 1,
                exportedAt: new Date().toISOString(),
                libraryName: libraryName || "",
                layouts
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)],
                { type: "application/json;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            // Filename: U_Biblioteka_<safe-name>_<timestamp>.json — same
            // sanitization rules as elsewhere (transliterate diacritics,
            // join multi-word with '-'). Empty name → just the timestamp.
            const safeName = libraryName
                ? transliterateToAscii(libraryName)
                    .replace(/[^a-zA-Z0-9\s]/g, "")
                    .trim()
                    .replace(/\s+/g, "-")
                : "";
            link.href = url;
            link.download = safeName
                ? `U_Biblioteka_${safeName}_${getTimestampString()}.json`
                : `U_Biblioteka_${getTimestampString()}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    }
    // Library restore: import a previously exported JSON, merging into the
    // current Biblioteka. Collisions are resolved with the standard -1, -2
    // suffix convention so nothing is overwritten silently.
    if (libraryImportBtn && libraryImportFileEl) {
        libraryImportBtn.addEventListener("click", () => {
            libraryImportFileEl.value = "";  // allow re-selecting the same file
            libraryImportFileEl.click();
        });
        libraryImportFileEl.addEventListener("change", () => {
            const file = libraryImportFileEl.files && libraryImportFileEl.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                let parsed;
                try {
                    parsed = JSON.parse(String(reader.result));
                } catch (err) {
                    alert("Nie udało się odczytać pliku — to nie jest poprawny JSON.");
                    return;
                }
                // Accept both the wrapped envelope { schema, version, layouts } and a bare array.
                const incoming = Array.isArray(parsed) ? parsed
                    : (Array.isArray(parsed && parsed.layouts) ? parsed.layouts : null);
                if (!incoming) {
                    alert("Plik nie zawiera Biblioteki układów (oczekiwano pola 'layouts' lub tablicy).");
                    return;
                }
                // Validate each entry has the minimum fields.
                const valid = incoming.filter(l => l && typeof l.name === "string" && typeof l.notation === "string");
                if (valid.length === 0) {
                    alert("Plik nie zawiera żadnych poprawnych układów.");
                    return;
                }
                if (!confirm(`Importować ${valid.length} ${valid.length === 1 ? "układ" : "układy"} z pliku?\nIstniejące układy zostaną zachowane; kolizje nazw dostaną sufiks -1, -2, …`)) {
                    return;
                }
                const current = loadSavedLayouts();
                const out = current.slice();
                let added = 0;
                for (const item of valid) {
                    const existingNames = new Set(out.map(l => l.name.toLowerCase()));
                    let finalName = item.name;
                    if (existingNames.has(finalName.toLowerCase())) {
                        let n = 1;
                        while (existingNames.has(`${item.name}-${n}`.toLowerCase())) n++;
                        finalName = `${item.name}-${n}`;
                    }
                    out.push({
                        id: `layout_${Date.now()}_${added}`,
                        name: finalName,
                        notation: item.notation,
                        timestamp: typeof item.timestamp === "number" ? item.timestamp : Date.now()
                    });
                    added++;
                }
                saveSavedLayouts(out);
                // If the imported envelope carries a libraryName and we don't
                // have one set (or it differs), offer to adopt it. Never
                // silently overwrite a name the user has already chosen.
                const incomingLibraryName = (parsed && typeof parsed.libraryName === "string")
                    ? parsed.libraryName.trim()
                    : "";
                if (incomingLibraryName && incomingLibraryName !== libraryName) {
                    const adopt = libraryName
                        ? confirm(`Plik zawiera nazwę Biblioteki "${incomingLibraryName}". Zastąpić obecną "${libraryName}"?`)
                        : confirm(`Plik zawiera nazwę Biblioteki "${incomingLibraryName}". Użyć tej nazwy?`);
                    if (adopt) {
                        libraryName = incomingLibraryName;
                        saveLibraryName(libraryName);
                        updateLibraryNameDisplay();
                    }
                }
                refreshLibraryList();
                alert(`Zaimportowano ${added} ${added === 1 ? "układ" : "układy"}.`);
            };
            reader.onerror = () => {
                alert("Błąd odczytu pliku.");
            };
            reader.readAsText(file);
        });
    }
    if (saveToLibraryBtn) {
        saveToLibraryBtn.addEventListener("click", () => {
            const finalName = saveCurrentLayoutToLibrary();
            if (!finalName) return;
            // Inline green confirmation flash on the button itself
            const original = saveToLibraryBtnText.textContent;
            saveToLibraryBtnText.textContent = `Zapisano "${finalName}"`;
            saveToLibraryBtn.classList.add("save-confirmation-flash");
            setTimeout(() => {
                saveToLibraryBtnText.textContent = original;
                saveToLibraryBtn.classList.remove("save-confirmation-flash");
            }, 1800);
        });
    }
    // Generic Esc-to-close for any open modal overlay (works for future modals too).
    document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        const openModals = document.querySelectorAll(".modal-overlay:not(.hidden)");
        if (openModals.length === 0) return;
        // Close only the topmost (last in DOM order) so stacked modals work.
        openModals[openModals.length - 1].classList.add("hidden");
    });
    // Space toggles the animation (same as clicking the canvas), unless the user is
    // typing in a textarea/input or a modal is open.
    document.addEventListener("keydown", (e) => {
        if (e.key !== " " && e.code !== "Space") return;
        const tag = (e.target && e.target.tagName) || "";
        if (tag === "TEXTAREA" || tag === "INPUT" || tag === "SELECT") return;
        if (document.querySelector(".modal-overlay:not(.hidden)")) return;
        e.preventDefault();
        if (animationFrameId !== null) {
            renderCurves();
        }
        else {
            startAnimation();
        }
    });
    // Presets (Tryb Absolutny — sheet settings) — save / load via localStorage.
    const presetsBtn = document.getElementById("presets-btn");
    const presetsModal = document.getElementById("presets-modal");
    const presetsModalCloseBtn = document.getElementById("presets-modal-close-btn");
    const savePresetBtn = document.getElementById("save-preset-btn");
    const savePresetNameInput = document.getElementById("save-preset-name");
    const savePresetErrorEl = document.getElementById("save-preset-error");
    const savedPresetsListEl = document.getElementById("saved-presets-list");
    const PRESETS_STORAGE_KEY = "bosacki_saved_presets";
    function loadSavedPresets() {
        try {
            const data = localStorage.getItem(PRESETS_STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        catch (e) {
            console.error("Failed to load saved presets:", e);
            return [];
        }
    }
    function saveSavedPresets(presets) {
        try {
            localStorage.setItem(PRESETS_STORAGE_KEY, JSON.stringify(presets));
        }
        catch (e) {
            console.error("Failed to save presets to storage:", e);
        }
    }
    function snapshotCurrentPresetValues() {
        return {
            preset: absPresetSelect ? absPresetSelect.value : "custom",
            unit: absUnitSelect ? absUnitSelect.value : "px",
            width: absWidthInput ? absWidthInput.value : "",
            height: absHeightInput ? absHeightInput.value : "",
            margin: absMarginInput ? absMarginInput.value : "",
            scale: absScaleInput ? absScaleInput.value : "",
            shiftX: absShiftXInput ? absShiftXInput.value : "0",
            shiftY: absShiftYInput ? absShiftYInput.value : "0",
            autocenter: absAutocenterCheckbox ? absAutocenterCheckbox.checked : false
        };
    }
    function applyPresetValues(values) {
        if (!values)
            return;
        if (absPresetSelect && values.preset !== undefined)
            absPresetSelect.value = values.preset;
        if (absUnitSelect && values.unit !== undefined)
            absUnitSelect.value = values.unit;
        if (absWidthInput && values.width !== undefined)
            absWidthInput.value = String(values.width);
        if (absHeightInput && values.height !== undefined)
            absHeightInput.value = String(values.height);
        if (absMarginInput && values.margin !== undefined)
            absMarginInput.value = String(values.margin);
        if (absScaleInput && values.scale !== undefined)
            absScaleInput.value = String(values.scale);
        if (absShiftXInput && values.shiftX !== undefined)
            absShiftXInput.value = String(values.shiftX);
        if (absShiftYInput && values.shiftY !== undefined)
            absShiftYInput.value = String(values.shiftY);
        if (absAutocenterCheckbox && values.autocenter !== undefined)
            absAutocenterCheckbox.checked = !!values.autocenter;
        // Sync the unit baseline so handleManualChange() doesn't try to convert
        // the values we just wrote (they're already in the saved unit).
        if (absUnitSelect)
            lastKnownUnit = absUnitSelect.value;
        // Re-run the same path used by manual edits so the canvas updates.
        if (typeof handleManualChange === "function") {
            handleManualChange();
        }
    }
    function previewPresetValues(values) {
        const parts = [];
        if (values.unit)
            parts.push(`${values.width}×${values.height} ${values.unit}`);
        if (values.scale !== undefined && values.scale !== "")
            parts.push(`skala ${values.scale}`);
        if (values.margin !== undefined && values.margin !== "")
            parts.push(`margines ${values.margin}`);
        return parts.join(" · ");
    }
    function openPresetsModal() {
        if (!presetsModal)
            return;
        presetsModal.classList.remove("hidden");
        if (savePresetNameInput)
            savePresetNameInput.value = "";
        if (savePresetErrorEl) {
            savePresetErrorEl.textContent = "";
            savePresetErrorEl.classList.add("hidden");
        }
        refreshPresetsList();
    }
    function closePresetsModal() {
        if (presetsModal)
            presetsModal.classList.add("hidden");
    }
    function refreshPresetsList() {
        if (!savedPresetsListEl)
            return;
        savedPresetsListEl.innerHTML = "";
        const presets = loadSavedPresets();
        if (presets.length === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "layouts-list-empty";
            emptyDiv.textContent = "Brak zapisanych presetów.";
            savedPresetsListEl.appendChild(emptyDiv);
            return;
        }
        // Newest first.
        presets.sort((a, b) => b.timestamp - a.timestamp);
        presets.forEach(preset => {
            const row = document.createElement("div");
            row.className = "layout-item-row";
            row.dataset.id = preset.id;
            // Info — clicking it loads the preset and closes the modal.
            const info = document.createElement("div");
            info.className = "layout-item-info";
            info.style.cursor = "pointer";
            info.title = "Załaduj ten preset";
            info.addEventListener("click", () => {
                applyPresetValues(preset.values);
                closePresetsModal();
            });
            const nameSpan = document.createElement("span");
            nameSpan.className = "layout-item-name";
            nameSpan.textContent = preset.name;
            const previewSpan = document.createElement("span");
            previewSpan.className = "layout-item-preview";
            previewSpan.textContent = previewPresetValues(preset.values);
            info.appendChild(nameSpan);
            info.appendChild(previewSpan);
            // Delete button.
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn-icon";
            deleteBtn.title = "Usuń preset";
            deleteBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>`;
            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (confirm(`Czy na pewno chcesz usunąć preset "${preset.name}"?`)) {
                    const current = loadSavedPresets();
                    saveSavedPresets(current.filter(p => p.id !== preset.id));
                    refreshPresetsList();
                }
            });
            row.appendChild(info);
            row.appendChild(deleteBtn);
            savedPresetsListEl.appendChild(row);
        });
    }
    if (presetsBtn) {
        presetsBtn.addEventListener("click", openPresetsModal);
    }
    if (presetsModalCloseBtn) {
        presetsModalCloseBtn.addEventListener("click", closePresetsModal);
    }
    if (presetsModal) {
        presetsModal.addEventListener("click", (e) => {
            if (e.target === presetsModal)
                closePresetsModal();
        });
    }
    if (savePresetBtn) {
        const submitSavePreset = () => {
            if (!savePresetErrorEl)
                return;
            savePresetErrorEl.textContent = "";
            savePresetErrorEl.classList.add("hidden");
            const name = savePresetNameInput ? savePresetNameInput.value.trim() : "";
            if (!name) {
                savePresetErrorEl.textContent = "Podaj nazwę presetu.";
                savePresetErrorEl.classList.remove("hidden");
                return;
            }
            const values = snapshotCurrentPresetValues();
            const presets = loadSavedPresets();
            const exists = presets.some(p => p.name.toLowerCase() === name.toLowerCase());
            if (exists) {
                if (!confirm(`Preset o nazwie "${name}" już istnieje. Czy chcesz go zastąpić?`)) {
                    return;
                }
            }
            const filtered = presets.filter(p => p.name.toLowerCase() !== name.toLowerCase());
            filtered.push({
                id: `preset_${Date.now()}`,
                name,
                values,
                timestamp: Date.now()
            });
            saveSavedPresets(filtered);
            if (savePresetNameInput)
                savePresetNameInput.value = "";
            refreshPresetsList();
        };
        savePresetBtn.addEventListener("click", submitSavePreset);
        if (savePresetNameInput) {
            savePresetNameInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    submitSavePreset();
                }
            });
        }
    }
    // Initial load
    renderCurves();
    startAnimation();
}
// Execute initialization safely depending on page load state
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
}
else {
    init();
}

</script>
</body>
</html>
