<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkietaż — Piotr Bosacki</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');

:root {
  --bg-color: #f8fafc;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --border-color: #cbd5e1;
  --accent-black: #000000;
  --accent-gray: #f1f5f9;
  
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-sans: 'Inter', sans-serif;
  --error-color: #dc2626;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem;
}

.app-container {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.app-header {
  text-align: center;
  margin-bottom: 0.2rem;
}

h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2.2rem;
  color: var(--text-primary);
  margin-bottom: 0.2rem;
}

.subtitle {
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
}

/* Visualization Board */
.canvas-board {
  aspect-ratio: 1 / 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 1rem;
}

#curve-svg {
  display: block;
  max-width: 100%;
  max-height: 100%;
  color: #000000;
}

/* Controls section (direct on page background, no panel) */
.controls-section {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.input-wrapper {
  position: relative;
  display: flex;
  width: 100%;
}

.series-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  width: 100%;
}

.series-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
}

.color-badge {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
}

.btn-icon {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  padding: 0;
}

.btn-icon:hover:not(:disabled) {
  background: var(--accent-gray);
  color: var(--text-primary);
  border-color: #94a3b8;
}

.btn-icon:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-icon svg {
  display: block;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
  align-self: flex-start;
  flex: none;
  height: auto;
}

.series-actions-row {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.2rem;
}

input[type="text"] {
  width: 100%;
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  color: var(--text-primary);
  font-family: monospace;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s ease;
}

input[type="text"]:focus {
  border-color: var(--accent-black);
}

/* Buttons Row */
.actions-row {
  display: flex;
  gap: 0.8rem;
  align-items: center;
  width: 100%;
}

.btn {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.85rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: background-color 0.15s ease, border-color 0.15s ease;
  flex: 1; /* Stretches to fill remaining space */
}

.btn-primary {
  background: var(--accent-black);
  color: #ffffff;
}

.btn-primary:hover {
  background: #27272a;
}

.btn-secondary {
  background: #ffffff;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
}

.btn-secondary:hover:not(:disabled) {
  background: #f8fafc;
  border-color: #94a3b8;
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Error alert styling */
.error-box {
  background: #fef2f2;
  border: 1px solid #fee2e2;
  color: var(--error-color);
  padding: 0.6rem 0.8rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.4;
  margin-top: 0.2rem;
}

.hidden {
  display: none !important;
}

/* Stats board */
.stats {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: monospace;
  background: #f1f5f9;
  padding: 0.6rem 0.8rem; /* matched button padding height */
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  flex-shrink: 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  height: 33px; /* aligns height perfectly with button */
}

/* Legend helper card */
.legend-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 0.8rem;
}

.legend-card p {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-bottom: 0.3rem;
}

.legend-card p:last-child {
  margin-bottom: 0;
}

.legend-card strong {
  color: var(--text-primary);
}

.legend-card code {
  background: #f1f5f9;
  padding: 0.05rem 0.2rem;
  border-radius: 3px;
  font-family: monospace;
  color: var(--text-primary);
  font-size: 0.75rem;
}

</style>
  <script>
    // Global error diagnostic handler
    window.onerror = function(message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.backgroundColor = '#dc2626';
      errDiv.style.color = '#ffffff';
      errDiv.style.padding = '15px';
      errDiv.style.zIndex = '99999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '14px';
      errDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.3)';
      errDiv.innerHTML = '<strong>Błąd aplikacji:</strong> ' + message + ' <br><small>Plik: ' + source + ' | Linia: ' + lineno + '</small>';
      document.body.appendChild(errDiv);
      return false;
    };
  </script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Parkietaż</h1>
      <p class="subtitle">Piotr Bosacki</p>
    </header>

    <!-- Obszar wizualizacji na górze -->
    <main class="board-container">
      <div class="canvas-board" id="svg-container">
        <!-- SVG renderowane dynamicznie przez JS -->
      </div>
    </main>

    <!-- Panel sterowania na dole -->
    <div class="controls-section">
      <div class="input-group">
        <label>Notacja łuków</label>
        <div id="series-container" class="series-list">
          <!-- Wiersze serii będą generowane dynamicznie przez JS -->
        </div>
        <div class="series-actions-row">
          <button id="add-series-btn" class="btn btn-secondary btn-small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Dodaj serię
          </button>
          <button id="color-mode-btn" class="btn btn-secondary btn-small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="2" x2="12" y2="22"></line>
            </svg>
            <span>Kolor</span>
          </button>
        </div>
        <div id="error-display" class="error-box hidden"></div>
      </div>

      <div class="actions-row">
        <button id="download-btn" class="btn btn-primary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Pobierz SVG
        </button>
        <div id="stats-display" class="stats">Łuki: 0</div>
      </div>

      <div class="legend-card">
        <p><strong>Zasady formatu:</strong> Notacja składa się z bloków <code>[rozmiar][skrętność]</code>:</p>
        <p>• Rozmiar: cyfra od <strong>1 do 7</strong> (promień = &phi;<sup>rozmiar</sup>)</p>
        <p>• Skrętność: litera <strong>P</strong> (prawo) lub <strong>L</strong> (lewo). Wielkość liter nie ma znaczenia.</p>
      </div>
    </div>
  </div>

  <script>
"use strict";
// Geometric Engine for Piotr Bosacki's Curves (Parkietaż)
const PHI = (1 + Math.sqrt(5)) / 2; // Golden Ratio
/**
 * Parses the notation string (e.g. "1p2p3p4p5l6l7l6l5p...") into structured modules.
 */
function parseNotation(notation) {
    const modules = [];
    const regex = /(\d+)([lLpP])/g;
    let match;
    while ((match = regex.exec(notation)) !== null) {
        const size = parseInt(match[1], 10);
        const direction = match[2].toUpperCase();
        modules.push({ size, direction });
    }
    return modules;
}
/**
 * Generates a sequence of quarter-circle arc segments from modules using turtle graphics math.
 * Invariant: 1p1p1p1p produces a perfect circle closing back to start.
 */
function generateArcs(modules) {
    // Start turtle at (0, 0) facing UP (Math.PI / 2) to align with reference SVG chirality
    let state = { x: 0, y: 0, angle: Math.PI / 2 };
    const arcs = [];
    for (const mod of modules) {
        const radius = Math.pow(PHI, mod.size);
        const turnRight = mod.direction === 'P';
        const s = turnRight ? 1 : -1;
        // The center of curvature is perpendicular to the current heading
        const cx = state.x + radius * Math.cos(state.angle - s * Math.PI / 2);
        const cy = state.y + radius * Math.sin(state.angle - s * Math.PI / 2);
        // Endpoint of the 90° arc
        const endX = cx + radius * Math.cos(state.angle);
        const endY = cy + radius * Math.sin(state.angle);
        // Update heading angle by 90°
        const newAngle = state.angle - s * Math.PI / 2;
        arcs.push({
            startX: state.x,
            startY: state.y,
            endX,
            endY,
            radius,
            sweep: turnRight ? 1 : 0,
            largeArc: 0,
            direction: mod.direction,
            size: mod.size
        });
        state = { x: endX, y: endY, angle: newAngle };
    }
    return arcs;
}
// SVG Renderer and UI Controller for Piotr Bosacki's Curves (Parkietaż)
/**
 * Generates highly distinguishable colors across the HSL color wheel using the Golden Ratio.
 * The first color (index 0) starts at Hue = 0 (Red). Saturation = 80%, Lightness = 45%.
 * This ensures colors spread out as widely as possible and never repeat exactly.
 */
function getColorForIndex(index) {
    // Golden ratio conjugate angle: ~137.508 degrees
    const goldenAngle = 137.508;
    const hue = (index * goldenAngle) % 360;
    return `hsl(${hue.toFixed(1)}, 80%, 45%)`;
}
// Global/Local State for color mode
let colorMode = 'color';
/**
 * Builds the SVG path 'd' attribute string from a list of ArcSegments.
 * Maps standard Cartesian coordinates (Y-up) to SVG space (Y-down) by negating Y.
 */
function renderSVGPath(arcs) {
    if (arcs.length === 0)
        return '';
    // Start at negated startY of first arc to adjust for SVG Y-down coordinate space
    let d = `M ${arcs[0].startX.toFixed(4)} ${(-arcs[0].startY).toFixed(4)}`;
    for (const arc of arcs) {
        d += ` A ${arc.radius.toFixed(4)} ${arc.radius.toFixed(4)} 0 0 ${arc.sweep} ${arc.endX.toFixed(4)} ${(-arc.endY).toFixed(4)}`;
    }
    return d;
}
/**
 * Computes the exact bounding box of the curve in SVG coordinate space.
 */
function computeBoundingBox(arcs) {
    if (arcs.length === 0) {
        return { minX: 0, maxX: 100, minY: 0, maxY: 100 };
    }
    let minX = arcs[0].startX;
    let maxX = arcs[0].startX;
    let minY = -arcs[0].startY;
    let maxY = -arcs[0].startY;
    for (const arc of arcs) {
        const svgEndX = arc.endX;
        const svgEndY = -arc.endY;
        minX = Math.min(minX, svgEndX);
        maxX = Math.max(maxX, svgEndX);
        minY = Math.min(minY, svgEndY);
        maxY = Math.max(maxY, svgEndY);
    }
    return { minX, maxX, minY, maxY };
}
/**
 * Creates and configures the SVG element with dynamic viewBox and path elements.
 */
function generateSVGElement(seriesList) {
    const allArcs = seriesList.flatMap(s => s.arcs);
    const { minX, maxX, minY, maxY } = computeBoundingBox(allArcs);
    const width = maxX - minX;
    const height = maxY - minY;
    // Add a 5% margin padding around the bounding box
    const padding = Math.max(width, height) * 0.05 || 10;
    const viewBoxX = minX - padding;
    const viewBoxY = minY - padding;
    const viewBoxWidth = width + 2 * padding;
    const viewBoxHeight = height + 2 * padding;
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", `${viewBoxX.toFixed(4)} ${viewBoxY.toFixed(4)} ${viewBoxWidth.toFixed(4)} ${viewBoxHeight.toFixed(4)}`);
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", "100%");
    svg.setAttribute("id", "curve-svg");
    const strokeWidth = (Math.max(viewBoxWidth, viewBoxHeight) * 0.003).toFixed(4);
    for (const s of seriesList) {
        if (s.arcs.length === 0)
            continue;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", renderSVGPath(s.arcs));
        path.setAttribute("fill", "none");
        // If colorMode is 'mono', use black. Otherwise use its palette color.
        path.setAttribute("stroke", colorMode === 'color' ? s.color : "#000000");
        path.setAttribute("stroke-width", strokeWidth);
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        svg.appendChild(path);
    }
    return svg;
}
/**
 * Triggers a download of the SVG curve containing all active paths.
 * Scales the coordinates to a standard 500-unit bounding box so that a stroke-width of 1
 * represents a crisp, thin, print-friendly line (0.2% of the drawing scale) on export.
 */
function downloadSVG(seriesList, filenameNotation) {
    const allArcs = seriesList.flatMap(s => s.arcs);
    const { minX, maxX, minY, maxY } = computeBoundingBox(allArcs);
    const width = maxX - minX;
    const height = maxY - minY;
    const maxDim = Math.max(width, height);
    // Scale factor to normalize the maximum dimension to 500 units
    const exportScale = maxDim > 0 ? 500 / maxDim : 1;
    // Scale and generate the SVG path elements
    const scaledSeries = seriesList.map(s => {
        const scaledArcs = s.arcs.map(arc => ({
            ...arc,
            startX: arc.startX * exportScale,
            startY: arc.startY * exportScale,
            endX: arc.endX * exportScale,
            endY: arc.endY * exportScale,
            radius: arc.radius * exportScale
        }));
        return {
            arcs: scaledArcs,
            color: s.color
        };
    });
    const allScaledArcs = scaledSeries.flatMap(s => s.arcs);
    const { minX: sMinX, maxX: sMaxX, minY: sMinY, maxY: sMaxY } = computeBoundingBox(allScaledArcs);
    const sWidth = sMaxX - sMinX;
    const sHeight = sMaxY - sMinY;
    const padding = Math.max(sWidth, sHeight) * 0.05 || 10;
    const viewBoxX = sMinX - padding;
    const viewBoxY = sMinY - padding;
    const viewBoxWidth = sWidth + 2 * padding;
    const viewBoxHeight = sHeight + 2 * padding;
    let pathElements = "";
    for (const s of scaledSeries) {
        if (s.arcs.length === 0)
            continue;
        pathElements += `  <path 
    d="${renderSVGPath(s.arcs)}" 
    fill="none" 
    stroke="${colorMode === 'color' ? s.color : "#000000"}" 
    stroke-width="1" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />\n`;
    }
    const svgString = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="${viewBoxX.toFixed(4)} ${viewBoxY.toFixed(4)} ${viewBoxWidth.toFixed(4)} ${viewBoxHeight.toFixed(4)}" 
  width="100%" 
  height="100%" 
  style="background-color: #ffffff;"
>
${pathElements}</svg>`;
    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const safeNotation = filenameNotation.trim().replace(/[^a-zA-Z0-9]/g, "_");
    link.href = url;
    link.download = `output-curve_${safeNotation}.svg`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}
// UI Setup & DOM Controller
function init() {
    const containerEl = document.getElementById("svg-container");
    const statsEl = document.getElementById("stats-display");
    const errorEl = document.getElementById("error-display");
    const downloadEl = document.getElementById("download-btn");
    const seriesContainerEl = document.getElementById("series-container");
    const addSeriesBtn = document.getElementById("add-series-btn");
    const colorModeBtn = document.getElementById("color-mode-btn");
    // Initial state with one series (Seria A)
    let seriesList = [
        {
            id: "series_0",
            notation: "1p2p3p4p5l6l7l6l5p4p3p2p1l2l3l4l5p6p7p6p5l4l3l2l",
            visible: true,
            color: getColorForIndex(0)
        }
    ];
    let seriesCounter = 1;
    let currentActiveSeries = [];
    function getEyeIcon(visible) {
        if (visible) {
            return `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      `;
        }
        else {
            return `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      `;
        }
    }
    function renderCurves() {
        errorEl.textContent = "";
        errorEl.classList.add("hidden");
        const visibleSeriesList = seriesList.filter(s => s.visible && s.notation.trim().length > 0);
        if (visibleSeriesList.length === 0) {
            errorEl.textContent = "Wpisz notację np: 1p2p3p4p5l6l7l6l5p4p3p2p1l2l3l4l5p6p7p6p5l4l3l2l - Seria A";
            errorEl.classList.remove("hidden");
            containerEl.innerHTML = "";
            statsEl.textContent = "Łuki: 0";
            downloadEl.disabled = true;
            currentActiveSeries = [];
            return;
        }
        const activeSeries = [];
        let parsingError = false;
        let totalArcs = 0;
        for (const item of visibleSeriesList) {
            const modules = parseNotation(item.notation);
            if (modules.length === 0) {
                parsingError = true;
                continue;
            }
            try {
                const arcs = generateArcs(modules);
                totalArcs += arcs.length;
                activeSeries.push({
                    arcs,
                    color: item.color,
                    notation: item.notation
                });
            }
            catch (err) {
                errorEl.textContent = `Błąd generowania: ${err.message}`;
                errorEl.classList.remove("hidden");
                containerEl.innerHTML = "";
                statsEl.textContent = "Łuki: 0";
                downloadEl.disabled = true;
                currentActiveSeries = [];
                return;
            }
        }
        if (parsingError && activeSeries.length === 0) {
            errorEl.textContent = "Błąd: Nie znaleziono poprawnych modułów w notacji. Użyj formatu [rozmiar][L/P] (np. 1p2p).";
            errorEl.classList.remove("hidden");
            containerEl.innerHTML = "";
            statsEl.textContent = "Łuki: 0";
            downloadEl.disabled = true;
            currentActiveSeries = [];
            return;
        }
        // Render the SVG curves
        try {
            const svg = generateSVGElement(activeSeries);
            containerEl.innerHTML = "";
            containerEl.appendChild(svg);
            currentActiveSeries = activeSeries;
            statsEl.textContent = `Łuki: ${totalArcs}`;
            // Check if all active series' notations end with a direction letter
            const allComplete = activeSeries.every(s => /[lLpP]/.test(s.notation.trim().slice(-1)));
            downloadEl.disabled = !allComplete;
        }
        catch (err) {
            errorEl.textContent = `Błąd: ${err.message}`;
            errorEl.classList.remove("hidden");
            containerEl.innerHTML = "";
            statsEl.textContent = "Łuki: 0";
            downloadEl.disabled = true;
            currentActiveSeries = [];
        }
    }
    function createSeriesRowDOM(item) {
        const row = document.createElement("div");
        row.className = "series-row";
        row.dataset.id = item.id;
        // 1. Input wrapper (Placed FIRST on the left)
        const wrapper = document.createElement("div");
        wrapper.className = "input-wrapper";
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Wpisz notację np: 1p2p3p4p5l6l7l6l5p4p3p2p1l2l3l4l5p6p7p6p5l4l3l2l - Seria A";
        input.value = item.notation;
        input.spellcheck = false;
        input.autocomplete = "off";
        input.addEventListener("input", () => {
            const start = input.selectionStart;
            const originalValue = input.value;
            let filteredValue = "";
            for (let i = 0; i < originalValue.length; i++) {
                const char = originalValue[i];
                if (filteredValue.length % 2 === 0) {
                    if (/[1-7]/.test(char))
                        filteredValue += char;
                }
                else {
                    if (/[lLpP]/.test(char))
                        filteredValue += char;
                }
            }
            if (originalValue !== filteredValue) {
                input.value = filteredValue;
                if (start !== null) {
                    let prefix = originalValue.substring(0, start);
                    let filteredPrefix = "";
                    for (let i = 0; i < prefix.length; i++) {
                        const char = prefix[i];
                        if (filteredPrefix.length % 2 === 0) {
                            if (/[1-7]/.test(char))
                                filteredPrefix += char;
                        }
                        else {
                            if (/[lLpP]/.test(char))
                                filteredPrefix += char;
                        }
                    }
                    const cursorPosition = filteredPrefix.length;
                    input.setSelectionRange(cursorPosition, cursorPosition);
                }
            }
            item.notation = input.value.trim();
            renderCurves();
        });
        wrapper.appendChild(input);
        row.appendChild(wrapper);
        // 2. Color badge (Placed SECOND, to the right of the input field)
        const badge = document.createElement("div");
        badge.className = "color-badge";
        badge.style.backgroundColor = item.color;
        row.appendChild(badge);
        // 3. Visibility button
        const visibilityBtn = document.createElement("button");
        visibilityBtn.className = "btn-icon";
        visibilityBtn.title = "Włącz/Wyłącz widoczność";
        visibilityBtn.innerHTML = getEyeIcon(item.visible);
        visibilityBtn.addEventListener("click", () => {
            item.visible = !item.visible;
            visibilityBtn.innerHTML = getEyeIcon(item.visible);
            renderCurves();
        });
        row.appendChild(visibilityBtn);
        // 4. Delete button
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn-icon";
        deleteBtn.title = "Usuń serię";
        deleteBtn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    `;
        deleteBtn.addEventListener("click", () => {
            removeSeries(item.id);
        });
        row.appendChild(deleteBtn);
        return row;
    }
    function refreshSeriesUI() {
        seriesContainerEl.innerHTML = "";
        seriesList.forEach((item) => {
            const row = createSeriesRowDOM(item);
            seriesContainerEl.appendChild(row);
        });
        // Disable delete buttons if only 1 row remains
        const deleteButtons = seriesContainerEl.querySelectorAll(".btn-icon:last-child");
        if (seriesList.length === 1 && deleteButtons.length === 1) {
            deleteButtons[0].disabled = true;
        }
    }
    function addSeries() {
        const newId = `series_${Date.now()}_${seriesCounter}`;
        const nextColor = getColorForIndex(seriesCounter);
        seriesCounter++;
        seriesList.push({
            id: newId,
            notation: "",
            visible: true,
            color: nextColor
        });
        refreshSeriesUI();
        renderCurves();
        // Focus the newly added input
        const inputs = seriesContainerEl.querySelectorAll("input[type='text']");
        if (inputs.length > 0) {
            inputs[inputs.length - 1].focus();
        }
    }
    function removeSeries(id) {
        if (seriesList.length <= 1)
            return;
        seriesList = seriesList.filter(s => s.id !== id);
        refreshSeriesUI();
        renderCurves();
    }
    // Event Listeners
    addSeriesBtn.addEventListener("click", addSeries);
    colorModeBtn.addEventListener("click", () => {
        colorMode = colorMode === 'color' ? 'mono' : 'color';
        colorModeBtn.querySelector("span").textContent = colorMode === 'color' ? "Kolor" : "Mono";
        // Toggle active class visually if needed
        if (colorMode === 'mono') {
            colorModeBtn.classList.add("btn-primary");
            colorModeBtn.classList.remove("btn-secondary");
        }
        else {
            colorModeBtn.classList.add("btn-secondary");
            colorModeBtn.classList.remove("btn-primary");
        }
        renderCurves();
    });
    downloadEl.addEventListener("click", () => {
        if (currentActiveSeries.length > 0) {
            const combinedNotation = currentActiveSeries
                .map(s => s.notation.trim())
                .filter(n => n.length > 0)
                .join("_");
            downloadSVG(currentActiveSeries, combinedNotation);
        }
    });
    // Initial load
    refreshSeriesUI();
    renderCurves();
}
// Execute initialization safely depending on page load state
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
}
else {
    init();
}

</script>
</body>
</html>
