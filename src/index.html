<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkietaż — Piotr Bosacki</title>
  <!-- INLINE_CSS -->
  <script>
    // Global error diagnostic handler
    window.onerror = function(message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.backgroundColor = '#dc2626';
      errDiv.style.color = '#ffffff';
      errDiv.style.padding = '15px';
      errDiv.style.zIndex = '99999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '14px';
      errDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.3)';
      errDiv.innerHTML = '<strong>Błąd aplikacji:</strong> ' + message + ' <br><small>Plik: ' + source + ' | Linia: ' + lineno + '</small>';
      document.body.appendChild(errDiv);
      return false;
    };
  </script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Parkietaż</h1>
      <p class="subtitle">Piotr Bosacki</p>
    </header>

    <!-- Obszar wizualizacji na górze -->
    <main class="board-container">
      <div class="canvas-board" id="svg-container">
        <!-- SVG renderowane dynamicznie przez JS -->
        <div id="drag-overlay" class="drag-overlay hidden">
          <div class="drag-overlay-content">
            <div class="drag-overlay-text">importuj<br>notację</div>
            <svg class="drag-overlay-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
        </div>
      </div>
    </main>

    <!-- Panel sterowania na dole -->
    <div class="controls-section">
      <div class="input-group">
        <label>Notacja łuków</label>
        <div class="textarea-container">
          <div id="notation-backdrop" class="textarea-backdrop"></div>
          <textarea id="notation-textarea" placeholder="Wklej lub wpisz notacje (separatory: spacje, nowa linia, np. 1p2p 3l4l lub 1. 1p2p, • 4l5l)"></textarea>
        </div>
        <div id="error-display" class="error-box hidden"></div>
        <div class="series-actions-row">
          <button id="library-btn" class="btn btn-secondary btn-small">
            <span class="swirl-icon">𖦹</span>
            <span>Biblioteka</span>
          </button>
          <button id="color-mode-btn" class="btn btn-secondary btn-small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="2" x2="12" y2="22"></line>
            </svg>
            <span>Kolor</span>
          </button>
        </div>
        <div id="series-legend" class="series-legend-list"></div>
      </div>

      <div class="actions-row">
        <button id="download-btn" class="btn btn-primary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Pobierz SVG
        </button>
        <div id="stats-display" class="stats">Łuki: 0</div>
      </div>

      <div class="legend-card">
        <p><strong>Zasady formatu:</strong> Notacja składa się z bloków <code>[rozmiar][skrętność]</code>:</p>
        <p>• Rozmiar: liczba od <strong>1 do 32</strong> (promień = &phi;<sup>rozmiar</sup>)</p>
        <p>• Skrętność: litera <strong>P</strong> (prawo) lub <strong>L</strong> (lewo).</p>
      </div>
    </div>
  </div>

  <!-- Library Modal Overlay -->
  <div id="library-modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <h2>Biblioteka układów</h2>
        <button id="modal-close-btn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Save Layout Section -->
        <div class="save-layout-section">
          <div class="save-input-row">
            <input type="text" id="save-layout-name" placeholder="Nazwa układu">
            <button id="save-layout-btn" class="btn btn-primary btn-small save-btn-narrow">Zapisz</button>
          </div>
          <div id="save-error" class="error-box hidden" style="margin-top: 0.4rem;"></div>
        </div>

        <!-- Saved Layouts List -->
        <div class="saved-layouts-section">
          <h3>Zapisane układy</h3>
          <div id="saved-layouts-list" class="layouts-list">
            <!-- Will be populated dynamically by JS -->
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="import-layouts-btn" class="btn btn-primary" disabled>Importuj zaznaczone układy z Biblioteki</button>
      </div>
    </div>
  </div>

  <!-- INLINE_JS -->
</body>
</html>
